<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Leitor Unificado – Prateleiras + Produtos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
:root {
  --primary: #4caf50;
  --primary-dark: #3e8e41;
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #333;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Segoe UI", Arial, sans-serif;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
}

.container {
  background: var(--card);
  width: 100%;
  max-width: 500px;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 {
  margin-top: 0;
  margin-bottom: 20px;
  text-align: center;
  font-weight: 600;
}

.file-input {
  display: flex;
  justify-content: center;
  margin-bottom: 25px;
}

.file-input input[type="file"] {
  padding: 10px;
  border: 2px dashed #ccc;
  border-radius: 8px;
  width: 100%;
  cursor: pointer;
  transition: border-color 0.3s, background 0.3s;
}

.file-input input[type="file"]:hover {
  border-color: var(--primary);
  background: #f9fff9;
}

#loader {
  display: none;
  margin-top: 20px;
}

#loader p {
  margin: 0 0 8px;
  font-size: 14px;
  text-align: center;
}

#loaderPercent {
  color: var(--primary);
}

#loaderBarBg {
  width: 100%;
  height: 16px;
  background: #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
}

#loaderBar {
  height: 100%;
  width: 0%;
  background: linear-gradient(
    90deg,
    var(--primary),
    var(--primary-dark)
  );
  border-radius: 10px;
  transition: width 0.3s ease;
}
</style>
</head>

<body>
<div id="viewer" style="display:none;width:100%;height:100vh;">
  
  <div style="
  position:fixed;
  top:35px;
  left:10px;
  z-index:1000;
  ">
  
  <button onclick="voltarInicio()" style="
  padding:8px 14px;
  font-size:14px;
  cursor:pointer;
  ">
  ← Voltar
  </button>
  
  </div>

  <iframe id="pdfFrame" 
  style="
  width:100%;
  height:100%;
  border:none;
  ">
  </iframe>

</div>

<div class="container">
  <h2>📄 Leitura de PDF - OPT2</h2>
  <div id="cronometro" style="margin-top:10px;text-align:center;font-size:14px;">
⏱ Tempo de leitura: <strong id="tempo">0.000s</strong>
</div></BR>


  <div class="file-input">
    <input type="file" id="fileInput" accept="application/pdf">
  </div>

  <div id="loader">
    <p>Lendo PDF: <strong><span id="loaderPercent">0%</span></strong></p>
    <div id="loaderBarBg">
      <div id="loaderBar"></div>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
 "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* =====================================================
   LOADER ÚNICO
===================================================== */
function iniciarLoader(){ loader.style.display="block"; atualizarLoader(0); }
function atualizarLoader(p){ loaderBar.style.width=p+"%"; loaderPercent.innerText=p+"%"; }
function finalizarLoader(){ atualizarLoader(100); setTimeout(()=>loader.style.display="none",500); }

/* =====================================================
   CRONÔMETRO DE PERFORMANCE
===================================================== */

let inicioTempo = 0;
let timerInterval = null;

function iniciarCronometro(){

    inicioTempo = performance.now();

    timerInterval = setInterval(() => {

        const agora = performance.now();
        const tempo = ((agora - inicioTempo) / 1000).toFixed(3);

        document.getElementById("tempo").innerText = tempo + "s";

    }, 50);

}

function pararCronometro(){

    clearInterval(timerInterval);

    const fim = performance.now();
    const tempoTotal = ((fim - inicioTempo) / 1000).toFixed(3);

    document.getElementById("tempo").innerText = tempoTotal + "s";
}

//------------MOSTRAR PDF--------------------

function mostrarPDF(url){

  document.querySelector(".container").style.display = "none";

  const viewer = document.getElementById("viewer");
  const frame = document.getElementById("pdfFrame");

  frame.src = url;

  viewer.style.display = "block";

  /* remove scroll da página */
  document.body.style.overflow = "hidden";
}

function voltarInicio(){

  document.getElementById("viewer").style.display = "none";

  document.querySelector(".container").style.display = "block";

  document.getElementById("pdfFrame").src = "";

  /* restaura scroll da página */
  document.body.style.overflow = "auto";

}


/* =====================================================
   LEITURA ÚNICA DO PDF
===================================================== */
fileInput.addEventListener("change", async function(){

    const file = this.files[0];
    if (!file) return;

    iniciarLoader();
	iniciarCronometro();

    const pdf = await pdfjsLib.getDocument({
        data: await file.arrayBuffer()
    }).promise;

    const totalPaginas = pdf.numPages;

    let texto = "";
    const contador = {};

    for (let p = 1; p <= totalPaginas; p++) {

        const page = await pdf.getPage(p);
        const content = await page.getTextContent();

        const codigosPagina = [];
        let quantidadePagina = 0;

        for (const item of content.items) {

            const x = item.transform[4];
            const y = item.transform[5];
            const t = item.str.trim();

            if (!t) continue;

            const tLower = t.toLowerCase();

            /* ========= TEXTO PARA PRATELEIRAS ========= */

            texto += t + " ";

            /* ========= CÓDIGOS PRODUTO ========= */

            if (
                x >= 17.314 && x <= 116 &&
                y <= 90 && y >= 73.491 &&
                !tLower.includes("destinat") &&
                tLower !== "codigo" &&
                tLower !== "código"
            ) {
                codigosPagina.push(t);
            }

            /* ========= QUANTIDADE ========= */

            if (
                x >= 370 && x <= 400 &&
                y <= 99 && y >= 80 &&
                !isNaN(t)
            ) {
                quantidadePagina = parseInt(t);
            }
        }

        texto += "\n";

        const codigoCompleto = codigosPagina.join(" ").trim();

        if (codigoCompleto !== "") {

            if (!contador[codigoCompleto]) {
                contador[codigoCompleto] = 0;
            }

            contador[codigoCompleto] += quantidadePagina;
        }

        atualizarLoader(Math.round(p / totalPaginas * 100));
    }

    /* ========= PRATELEIRAS ========= */

    const textoPDF = texto.toUpperCase();

    const itensPrat = extrairDadosPrateleiras(textoPDF);
    const resumoPrat = calcularResumoPrateleiras(itensPrat);

    /* ========= PRODUTOS ========= */

    const itensProd = Object.entries(contador).map(
        ([codigo, quantidade]) => ({
            codigo,
            quantidade
        })
    );
	pararCronometro();
    finalizarLoader();

    /* ========= GERAR PDF ========= */

    await gerarPDFUnificado(resumoPrat, itensProd);
});

/* =====================================================
   ========== CÓDIGO PRATELEIRAS (ORIGINAL)
===================================================== */
function extrairDadosPrateleiras(texto){
  return extrairDados(texto);
}
function calcularResumoPrateleiras(itens){
  return calcularResumo(itens);
}

/* =========================
   EXTRAÇÃO
========================= */
function extrairDados(texto) {
    const linhas = texto.split("\n").map(l => l.trim()).filter(Boolean);

    const codigos = [
        "NATURAL C1","NATURAL C2","NATURAL C4","NATURAL C6",
        "ENVELHECIDA C1","ENVELHECIDA C2","ENVELHECIDA C4","ENVELHECIDA C6",
        "PRETA C1","PRETA C2","PRETA C4","PRETA C6",
        "60CM NAT C1","60CM NAT C2","60CM NAT C4","60CM NAT C6",
        "60CM ENV C1","60CM ENV C2","60CM ENV C4","60CM ENV C6","60CM PRE C1","60CM PRE C2",
		"60CM PRE C4","60CM PRE C6","3 ANDAR"
    ];

    const itens = [];

    for (const linha of linhas) {
		const linhaNormalizada = linha.replace(/\//g, "");
        const codigo = codigos.find(c => linhaNormalizada.includes(c));
		let codigoC = 0;
        if (!codigo) continue;

        const tamanho = codigo === "3 ANDAR" ? 30 : codigo.includes("60") ? 60 : 40;
        let cor = "NATURAL";
        if (codigo.includes("PRETA") || codigo.includes("PRE")) cor = "PRETA";
        if (codigo.includes("ENV")) cor = "ENVELHECIDA";
		if (codigo != "3 ANDAR"){
			codigoC = parseInt(codigo.match(/C\/?([1246])/)[1]);
		}else{
			codigoC = 0;
		}

        let quantidade = 1;
        const q = linha.match(/(\d+)\s*$/);
        if (q) quantidade = parseInt(q[1]);

        itens.push({ tamanho, cor, codigoC, quantidade, etiqueta: 1 });
    }
    return itens;
}

/* =========================
   CÁLCULO
========================= */
function calcularResumo(itens) {
    const resumo = {};
    let totalMaos = 0;
	let totalMadeiras = 0;

    const pintura = {
        PRETA_40: 0,
		PRETA_60: 0,
        ENVELHECIDA_40: 0,
        ENVELHECIDA_60: 0,
		NATURAL_40: 0,
		NATURAL_60: 0,
		ANDAR_3: 0
    };

    for (const i of itens) {
        //if (i.cor === "PRETA" && i.tamanho === 60) continue;

        const k = `${i.tamanho}_${i.cor}_C${i.codigoC}`;
        if (!resumo[k]) {
            resumo[k] = {
                tamanho: i.tamanho,
                cor: i.cor,
                codigoC: i.codigoC,
                quantidadeVendida: 0,
                prateleiras: 0,
                kitsBase: 0,
                madeiras: 0,
                maosFrancesas: 0
            };
        }

        resumo[k].quantidadeVendida++;

        const qtd = i.quantidade;
        let p=0,kb=0,m=0,ma=0;

        if (i.codigoC===0){p=3*qtd;m=3*qtd;ma=0*qtd;}
		if (i.codigoC===1){p=1*qtd;m=1*qtd;ma=2*qtd;}
        if (i.codigoC===2){p=2*qtd;kb=1*qtd;m=2*qtd;ma=4*qtd;}
        if (i.codigoC===4){p=4*qtd;kb=2*qtd;m=4*qtd;ma=8*qtd;}
        if (i.codigoC===6){p=6*qtd;kb=3*qtd;m=6*qtd;ma=12*qtd;}

        if (i.cor==="PRETA") pintura[`PRETA_${i.tamanho}`]+=m;
		if (i.codigoC===0) pintura.ANDAR_3+=m;
		if (i.cor==="NATURAL") pintura[`NATURAL_${i.tamanho}`]+=m;
        if (i.cor==="ENVELHECIDA") pintura[`ENVELHECIDA_${i.tamanho}`]+=m;

        resumo[k].prateleiras+=p;
        resumo[k].kitsBase+=kb;
        resumo[k].madeiras+=m;
        resumo[k].maosFrancesas+=ma;
        totalMaos+=ma;
		totalMadeiras+=m;
    }

    const embalar = {};
    for (const k in resumo) {
        const r = resumo[k];
        const g = r.codigoC===0 ? "3 ANDAR" : `${r.tamanho}_${r.cor}`;
        if (!embalar[g]) embalar[g]={total:0,C1:0,codigoC:0};
        embalar[g].total+=r.kitsBase;
		embalar[g].codigoC = r.codigoC;
        if (r.codigoC===1) embalar[g].C1+=r.prateleiras;
		if (r.codigoC===0) embalar[g].C1+=r.prateleiras/3;
    }

    resumo.__TOTAL_MAOS__=totalMaos;
	resumo.__TOTAL_MAD__=totalMadeiras;
    resumo.__PINTURA__=pintura;
    resumo.__EMBALAR__=embalar;
    return resumo;
}

/* =========================
   RESUMO NA TELA
========================= */
function mostrarResumo(resumo) {
    const div=document.createElement("div");
    div.style="margin-top:20px;background:#111;color:#fff;padding:15px";
    div.innerHTML="<b>Resumo gerado com sucesso ✔</b><br>PDF será baixado automaticamente.";
    document.body.appendChild(div);
}

/* =========================
   GERA PDF
========================= */
async function gerarPDFPrateleiras(resumo, doc) {

    const totalMaos = resumo.__TOTAL_MAOS__;
    const totalMadeiras = resumo.__TOTAL_MAD__;
    const pintura = resumo.__PINTURA__;
    const totaisEmbalar = resumo.__EMBALAR__;

    delete resumo.__TOTAL_MAOS__;
    delete resumo.__TOTAL_MAD__;
    delete resumo.__PINTURA__;
    delete resumo.__EMBALAR__;

    /* =========================
       PÁGINA 1 – RESUMO DETALHADO
    ========================== */
    doc.setFontSize(11);
    doc.text("Resumo de Produção", 52.5, 8, { align: "center" });

    doc.setFontSize(7);
    doc.text(`Gerado em: ${new Date().toLocaleString()}`, 52.5, 12, { align: "center" });

    const linhas = [];
    for (const k in resumo) {
        const r = resumo[k];
        linhas.push([
            r.codigoC === 0 ? "3 ANDAR" : `${r.tamanho} ${r.cor} C${r.codigoC}`,
            r.quantidadeVendida,
            r.prateleiras,
            r.kitsBase,
            r.madeiras,
            r.maosFrancesas
        ]);
    }

    doc.autoTable({
        head: [["Modelo", "Vend.", "Prat.", "C/2", "Mad.", "Mãos"]],
        body: linhas,
        startY: 15,
        styles: {
            fontSize: 6,
            cellPadding: 0.8,
            halign: "center",
            valign: "middle"
        },
        headStyles: {
            fillColor: [40, 40, 40],
            textColor: 255
        },
        margin: { left: 3, right: 3 }
    });

    doc.autoTable({
        head: [["Métricas", "Total"]],
        body: [
            ["Tábuas 40cm", pintura.PRETA_40 + pintura.ENVELHECIDA_40 + pintura.NATURAL_40],
            ["Tábuas 60cm", pintura.ENVELHECIDA_60 + pintura.NATURAL_60 + pintura.PRETA_60],
            ["Tábuas 3 Andar", pintura.ANDAR_3],
            ["Total de Tábuas", totalMadeiras],
            ["Total Mãos Francesas", totalMaos]
        ],
        startY: doc.lastAutoTable.finalY + 2,
        styles: { fontSize: 7, cellPadding: 1, halign: "center" },
        headStyles: { fillColor: [60, 60, 60], textColor: 255 },
        margin: { left: 10, right: 10 }
    });

    /* =========================
       PÁGINA 2 – EMBALAR
    ========================== */
	doc.addPage();

	doc.setFontSize(11);
	doc.text("Total a Embalar", 52.5, 12, { align: "center" });

	const gruposLinhas = [];
	let totalEmbalar3Andar = 0;

	Object.keys(totaisEmbalar).forEach(key => {

		const item = totaisEmbalar[key];
		const [tamanho, cor] = key.split("_");

		if (item.codigoC === 0) {

			// acumula todos os 3 ANDAR
			totalEmbalar3Andar = item.C1;

		} else {

			gruposLinhas.push([
				`${tamanho} ${cor}`,
				item.total,
				item.C1
			]);

		}

	});

	doc.autoTable({
		head: [["Modelo", "C/2", "C/1"]],
		body: gruposLinhas,
		startY: 14,
		styles: { fontSize: 12, cellPadding: 1.2, halign: "center" },
		headStyles: { fillColor: [40, 40, 40], textColor: 255 },
		margin: { left: 3, right: 3 }
	});


	/* =========================
	   MODELO FURAR
	========================= */

	doc.autoTable({
		head: [["Modelo", "Furar", "Embalar"]],
		body: [
			["3 ANDAR", pintura.ANDAR_3, totalEmbalar3Andar]
		],
		startY: doc.lastAutoTable.finalY + 3,
		styles: { fontSize: 12, cellPadding: 1.2, halign: "center" },
		headStyles: { fillColor: [40, 40, 40], textColor: 255 },
		margin: { left: 3, right: 3 }
	});

    /* =========================
       PÁGINA 3 – PINTURA
    ========================== */
    doc.addPage();

    doc.setFontSize(11);
    doc.text("Resumo de Pintura", 52.5, 12, { align: "center" });

    doc.autoTable({
        head: [["Modelo", "Tábuas"]],
        body: [
            ["40cm Preta", pintura.PRETA_40],
			["60cm Preta", pintura.PRETA_60],
            ["40cm Envelhecida", pintura.ENVELHECIDA_40],
            ["60cm Envelhecida", pintura.ENVELHECIDA_60]
        ],
        startY: 14,
        styles: { fontSize: 12, cellPadding: 1.4, halign: "center" },
        headStyles: { fillColor: [40, 40, 40], textColor: 255 },
        margin: { left: 3, right: 3 }
    });

    /* =========================
       RESTAURA EXTRAS
    ========================== */
    resumo.__TOTAL_MAOS__ = totalMaos;
    resumo.__TOTAL_MAD__ = totalMadeiras;
    resumo.__PINTURA__ = pintura;
    resumo.__EMBALAR__ = totaisEmbalar;
}

/* ================= GERAR PDF ================= */
async function gerarPDFProdutos(itens, doc) {

  // Página 10x15cm
  const PAGE_W = 105;
  const PAGE_H = 148;

  // Margem reduzida e igual em todos os lados
  const MARGIN = 3;

  /* ===== TÍTULO ===== */
  doc.setFontSize(12);
  doc.text(
    "Resumo de Produtos",
    PAGE_W / 2,
    MARGIN + 3,
    { align: "center" }
  );

  // Transformando itens em linhas: apenas código e quantidade
  const linhas = itens.map(i => [
    i.codigo,       // Código
    i.quantidade    // Quantidade
  ]);

  /* ===== TABELA ===== */
  doc.autoTable({
    startY: MARGIN + 7,

    margin: {
      top: MARGIN,
      left: MARGIN,
      right: MARGIN,
      bottom: MARGIN
    },

    tableWidth: PAGE_W - MARGIN * 2,

    head: [["Código - SKU", "Qtd"]], // duas colunas
    body: linhas,

    rowPageBreak: "avoid",

    styles: {
      fontSize: 12,
      valign: "middle",
      cellPadding: 1.2,
      overflow: "linebreak"
    },

    headStyles: {
      fillColor: [40, 40, 40],
      textColor: 255,
      fontSize: 12
    },

    columnStyles: {
      0: { cellWidth: 74 }, // Código ocupa mais espaço
      1: { cellWidth: 25, halign: "center" } // Quantidade centralizada
    }
  });

}

/* =====================================================
   PDF FINAL UNIFICADO
===================================================== */
async function gerarPDFUnificado(resumoPrateleiras, itensProdutos){
  await import("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
  await import("https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:"portrait",unit:"mm",format:[105,148]});

  /* ===== PRATELEIRAS PRIMEIRO ===== */
  await gerarPDFPrateleiras(resumoPrateleiras, doc);

  /* ===== PRODUTOS DEPOIS ===== */
  doc.addPage();
  await gerarPDFProdutos(itensProdutos, doc);

	const blob = doc.output("blob");
	const url = URL.createObjectURL(blob);

	mostrarPDF(url);

}
</script>

</body>
</html>
